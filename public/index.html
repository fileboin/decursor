<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decursor</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --border: #3c3c3c;
    --text: #d4d4d4;
    --accent: #4d9eff;
    --accent-hover: #6cb0ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  #topbar h1 {
    font-size: 15px;
    margin: 0;
    margin-right: 8px;
    color: var(--accent);
    white-space: nowrap;
  }
  select, input, button, textarea {
    background: #2d2d30;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 13px;
  }
  button {
    cursor: pointer;
    background: var(--accent);
    color: #111;
    font-weight: 600;
    border: none;
  }
  button:hover { background: var(--accent-hover); }
  button.secondary {
    background: #2d2d30;
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover { background: #3c3c3c; }

  #layout {
    display: flex;
    flex: 1;
    min-height: 0;
    flex-direction: row;
  }

  #editor-pane {
    width: 60%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }
  #editor-toolbar {
    display: flex;
    gap: 6px;
    padding: 6px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  #monaco-container {
    flex: 1;
    min-height: 0;
  }

  #chat-pane {
    width: 40%;
    display: flex;
    flex-direction: column;
  }
  #chat-log {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 10px;
    font-size: 13px;
  }
  .msg {
    margin-bottom: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user { color: #9cdcfe; }
  .msg.assistant { color: #d4d4d4; }
  .msg .role-label {
    font-size: 11px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 2px;
  }
  #chat-input-area {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  #chat-input {
    resize: vertical;
    min-height: 50px;
    font-family: inherit;
  }
  #chat-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  label.toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  #status {
    font-size: 11px;
    opacity: 0.6;
    margin-left: auto;
  }

  /* GitHub modal */
  #github-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 12px;
  }
  #github-modal.open { display: flex; }
  #github-modal-content {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    width: 90%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 90vh;
    max-height: 90dvh;
    overflow-y: auto;
  }
  #github-modal-content h2 { margin: 0 0 4px 0; font-size: 16px; }
  #github-modal-content label { font-size: 12px; opacity: 0.8; }
  #github-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  /* ── Mobile responsive (≤ 768 px) ── */
  @media (max-width: 768px) {
    #layout {
      flex-direction: column;
    }

    #editor-pane {
      width: 100%;
      height: 38vh;
      flex-shrink: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    #chat-pane {
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    /* Touch-friendly targets (≥ 44 px) */
    button {
      min-height: 44px;
      padding: 10px 14px;
    }
    select,
    input:not([type="checkbox"]) {
      min-height: 44px;
      padding: 10px 8px;
    }
    textarea#chat-input {
      min-height: 64px;
      resize: none;
    }

    /* Topbar: selects fill available space */
    #topbar {
      gap: 6px;
      padding: 6px 8px;
    }
    #provider-select,
    #model-select {
      flex: 1;
      min-width: 0;
    }

    /* Editor toolbar: filename input fills row */
    #filename-input {
      flex: 1;
      width: auto !important;
      min-width: 0;
    }

    /* Chat controls: send button full-width, easy to tap */
    #chat-controls {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    #send-btn {
      width: 100%;
      order: 2;
    }
    label.toggle {
      order: 1;
    }
    #status {
      order: 3;
      margin-left: 0;
      text-align: center;
    }

    /* GitHub modal fills screen on narrow viewports */
    #github-modal {
      align-items: flex-end;
      padding: 0;
    }
    #github-modal-content {
      width: 100%;
      max-width: 100%;
      border-radius: 12px 12px 0 0;
      max-height: 92vh;
      max-height: 92dvh;
      padding: 16px 16px 24px;
    }
    #github-modal-actions {
      flex-direction: column;
      justify-content: stretch;
    }
    #github-modal-actions button {
      width: 100%;
    }
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>Decursor</h1>

  <select id="provider-select">
    <option value="openrouter">OpenRouter</option>
    <option value="ollama">Ollama (self-hosted)</option>
  </select>

  <select id="model-select">
    <!-- populated by app.js -->
  </select>

  <button class="secondary" id="github-btn">GitHub</button>
</div>

<div id="layout">
  <div id="editor-pane">
    <div id="editor-toolbar">
      <input id="filename-input" placeholder="filename.js" value="untitled.js" style="width:140px" />
      <button class="secondary" id="new-file-btn">Novi fajl</button>
      <span id="editor-status" style="font-size:11px; opacity:0.6; margin-left:auto;"></span>
    </div>
    <div id="monaco-container"></div>
  </div>

  <div id="chat-pane">
    <div id="chat-log"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="Pitaj AI nešto o kodu..."></textarea>
      <div id="chat-controls">
        <label class="toggle">
          <input type="checkbox" id="include-context" checked />
          Pošalji kod kao kontekst
        </label>
        <button id="send-btn">Pošalji</button>
        <span id="status"></span>
      </div>
    </div>
  </div>
</div>

<!-- GitHub modal -->
<div id="github-modal">
  <div id="github-modal-content">
    <h2>GitHub integracija</h2>

    <label>Personal Access Token (čuva se samo lokalno u browseru)</label>
    <input id="gh-token" type="password" placeholder="ghp_..." />

    <label>Repo (owner/repo)</label>
    <input id="gh-repo" placeholder="fileboin/decursor" />

    <label>Grana</label>
    <input id="gh-branch" placeholder="main" value="main" />

    <label>Putanja fajla u repou</label>
    <input id="gh-path" placeholder="index.html" />

    <div id="github-modal-actions">
      <button class="secondary" id="gh-pull-btn">Pull (učitaj)</button>
      <button id="gh-push-btn">Push (sačuvaj)</button>
      <button class="secondary" id="gh-close-btn">Zatvori</button>
    </div>
    <span id="gh-status" style="font-size:11px; opacity:0.7;"></span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="app.js"></script>
</body>
</html>
