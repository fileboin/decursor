<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decursor</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --border: #3c3c3c;
    --text: #d4d4d4;
    --accent: #4d9eff;
    --accent-hover: #6cb0ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  #topbar h1 {
    font-size: 15px;
    margin: 0;
    margin-right: 8px;
    color: var(--accent);
    white-space: nowrap;
  }
  select, input, button, textarea {
    background: #2d2d30;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 13px;
  }
  button {
    cursor: pointer;
    background: var(--accent);
    color: #111;
    font-weight: 600;
    border: none;
  }
  button:hover { background: var(--accent-hover); }
  button.secondary {
    background: #2d2d30;
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover { background: #3c3c3c; }

  #layout {
    display: flex;
    flex: 1;
    min-height: 0;
    flex-direction: row;
  }

  /* ── File tree panel ── */
  #file-tree-pane {
    width: 220px;
    min-width: 160px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  #file-tree-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text);
    opacity: 0.85;
    flex-shrink: 0;
  }
  #file-tree-header .refresh-btn {
    background: transparent;
    border: none;
    color: var(--text);
    opacity: 0.55;
    padding: 2px 5px;
    font-size: 13px;
    min-height: unset;
    cursor: pointer;
    line-height: 1;
  }
  #file-tree-header .refresh-btn:hover { opacity: 1; background: transparent; }
  #file-tree {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }
  #file-tree ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .tree-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 6px;
    cursor: pointer;
    user-select: none;
    font-size: 12.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.5;
  }
  .tree-item:hover { background: #2a2d2e; }
  .tree-item.active { background: #094771; color: #fff; }
  .tree-dir  { color: #e8c369; }
  .tree-file { color: var(--text); }
  .tree-arrow {
    font-size: 9px;
    display: inline-block;
    width: 10px;
    flex-shrink: 0;
    transition: transform 0.12s;
    opacity: 0.7;
  }
  .tree-arrow.open { transform: rotate(90deg); }
  .tree-children { display: none; }
  .tree-children.open { display: block; }
  .tree-empty {
    font-size: 12px;
    color: var(--text);
    opacity: 0.4;
    padding: 14px 10px;
    text-align: center;
  }

  #editor-pane {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }
  #editor-toolbar {
    display: flex;
    gap: 6px;
    padding: 6px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  #monaco-container {
    flex: 1;
    min-height: 0;
  }

  #chat-pane {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  #chat-log {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 10px;
    font-size: 13px;
  }
  .msg {
    margin-bottom: 12px;
    word-break: break-word;
  }
  .msg.user {
    color: #9cdcfe;
    white-space: pre-wrap;
  }
  .msg.assistant { color: #d4d4d4; }
  .msg .role-label {
    font-size: 11px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 2px;
  }
  /* Plain text spans inside assistant messages */
  .msg-text {
    display: block;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Code blocks in AI chat ── */
  .code-block-wrapper {
    margin: 6px 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    font-family: "Consolas", "Courier New", monospace;
  }
  .code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #2d2d30;
    padding: 3px 8px;
    border-bottom: 1px solid var(--border);
    gap: 6px;
    flex-wrap: wrap;
  }
  .code-lang {
    font-size: 10px;
    opacity: 0.65;
    text-transform: lowercase;
    font-family: monospace;
  }
  .code-block-btns {
    display: flex;
    gap: 4px;
  }
  .btn-code-action {
    font-size: 10px;
    padding: 2px 8px;
    min-height: unset;
    background: #1a3a1a;
    color: #4ec94e;
    border: 1px solid #2d5a2d;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
  }
  .btn-code-action:hover {
    background: #2d5a2d;
    color: #9cdcfe;
  }
  .btn-code-replace {
    background: #2d2d30;
    color: #d4d4d4;
    border-color: #555;
  }
  .btn-code-replace:hover {
    background: #3c3c3c;
    color: #fff;
  }
  .btn-code-replace-highlight {
    background: #1a2d3a;
    color: #4d9eff;
    border-color: #2d5a7a;
  }
  .btn-code-replace-highlight:hover {
    background: #2d5a7a;
    color: #fff;
  }
  .code-block-body {
    margin: 0;
    padding: 8px 10px;
    background: #1e1e1e;
    overflow-x: auto;
    white-space: pre;
    font-size: 12px;
    color: #d4d4d4;
    line-height: 1.5;
    word-break: normal;
  }
  /* Multi-file selection checkbox in file tree */
  .file-checkbox {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    accent-color: var(--accent);
    cursor: pointer;
    margin: 0;
  }

  /* Counter bar above chat input */
  #selected-files-info {
    display: none;
    font-size: 11px;
    color: var(--accent);
    padding: 2px 0;
    opacity: 0.85;
  }

  /* "Apply to file" button style */
  .btn-code-apply-file {
    background: #1a1a3a;
    color: #9cdcfe;
    border: 1px solid #2d2d7a;
    border-radius: 3px;
  }
  .btn-code-apply-file:hover {
    background: #2d2d7a;
    color: #fff;
  }

  #chat-input-area {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  #chat-input {
    resize: vertical;
    min-height: 50px;
    font-family: inherit;
  }
  #chat-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  label.toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  #status {
    font-size: 11px;
    opacity: 0.6;
    margin-left: auto;
  }

  /* GitHub modal */
  #github-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 12px;
  }
  #github-modal.open { display: flex; }
  #github-modal-content {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    width: 90%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 90vh;
    max-height: 90dvh;
    overflow-y: auto;
  }
  #github-modal-content h2 { margin: 0 0 4px 0; font-size: 16px; }
  #github-modal-content label { font-size: 12px; opacity: 0.8; }
  #github-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  /* ── Terminal panel ── */
  #terminal-pane {
    display: none;
    flex-direction: column;
    height: 220px;
    min-height: 120px;
    max-height: 50vh;
    border-top: 2px solid var(--border);
    background: #0d0d0d;
    flex-shrink: 0;
  }
  #terminal-pane.open { display: flex; }
  #terminal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 3px 8px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text);
    flex-shrink: 0;
  }
  #terminal-header .term-title { opacity: 0.75; }
  #terminal-header .term-header-btns {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  #terminal-header .term-btn {
    background: transparent;
    border: none;
    color: var(--text);
    opacity: 0.5;
    padding: 1px 6px;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
    min-height: unset;
    border-radius: 3px;
  }
  #terminal-header .term-btn:hover { opacity: 1; background: #2a2a2a; }
  #terminal-output {
    flex: 1;
    overflow-y: auto;
    padding: 6px 10px;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 12px;
    line-height: 1.55;
    background: #0d0d0d;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .term-stdout { color: #d4d4d4; }
  .term-stderr { color: #f48771; }
  .term-info   { color: #569cd6; }
  .term-prompt { color: #4ec94e; font-weight: bold; }
  #terminal-input-row {
    display: flex;
    align-items: center;
    border-top: 1px solid #1e1e1e;
    background: #111;
    flex-shrink: 0;
  }
  #terminal-input-row .term-prompt-symbol {
    padding: 0 6px 0 10px;
    color: #4ec94e;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 13px;
    user-select: none;
    flex-shrink: 0;
  }
  #terminal-cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    border-radius: 0;
    color: #d4d4d4;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 12px;
    padding: 7px 10px 7px 0;
    outline: none;
  }
  /* "Run in terminal" button on bash/sh code blocks */
  .btn-run-terminal {
    background: #1a1030;
    color: #c586c0;
    border: 1px solid #4d2d7a;
    border-radius: 3px;
  }
  .btn-run-terminal:hover { background: #2d1a4a; color: #fff; }

  /* ── Diff preview modal ── */
  #diff-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 12px;
  }
  #diff-modal.open { display: flex; }
  #diff-modal-content {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    width: 92%;
    max-width: 780px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 82vh;
    max-height: 82dvh;
    overflow: hidden;
  }
  #diff-modal-content h2 { margin: 0; font-size: 15px; }
  #diff-modal-subtitle {
    font-size: 11px;
    opacity: 0.55;
    margin-top: -4px;
  }
  #diff-view {
    flex: 1;
    overflow-y: auto;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 12px;
    line-height: 1.5;
    background: #141414;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 0;
    min-height: 60px;
  }
  .diff-line {
    padding: 1px 12px;
    white-space: pre;
    display: block;
    overflow-x: auto;
  }
  .diff-line-added    { background: #122112; color: #4ec94e; }
  .diff-line-removed  { background: #2a1212; color: #f48771; text-decoration: line-through; }
  .diff-line-unchanged { color: #555; }
  #diff-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  #diff-accept-btn {
    background: #1a3a1a;
    color: #4ec94e;
    border: 1px solid #2d5a2d;
  }
  #diff-accept-btn:hover { background: #2d5a2d; color: #fff; }

  /* ── Exec confirm modal ── */
  #exec-confirm-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 12px;
  }
  #exec-confirm-modal.open { display: flex; }
  #exec-confirm-content {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    width: 90%;
    max-width: 580px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #exec-confirm-content h2 { margin: 0; font-size: 15px; }
  #exec-confirm-content p  { margin: 0; font-size: 12px; opacity: 0.65; }
  #exec-confirm-cmd {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 12px;
    color: #4ec94e;
    white-space: pre-wrap;
    word-break: break-all;
    margin: 0;
    max-height: 220px;
    overflow-y: auto;
  }
  #exec-confirm-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  #exec-accept-btn {
    background: #1a1030;
    color: #c586c0;
    border: 1px solid #4d2d7a;
  }
  #exec-accept-btn:hover { background: #2d1a4a; color: #fff; }

  /* ── Mobile responsive (≤ 768 px) ── */
  @media (max-width: 768px) {
    #layout {
      flex-direction: column;
    }

    #file-tree-pane {
      width: 100%;
      min-width: unset;
      max-height: 28vh;
      max-height: 28dvh;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    /*
     * Editor grows to fill whatever space the chat-pane doesn't need.
     */
    #editor-pane {
      width: 100%;
      flex: 1 1 0;
      min-height: 30vh;
      min-height: 30dvh;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    #chat-pane {
      width: 100%;
      flex: 0 0 auto;
      min-height: 0;
    }

    /* Don't let the empty log balloon to fill the pane; cap when full. */
    #chat-log {
      flex: 0 1 auto;     /* override the global flex:1 */
      max-height: 40vh;
      max-height: 40dvh;
      overflow-y: auto;
    }

    /* Touch-friendly targets (≥ 44 px) */
    button {
      min-height: 44px;
      padding: 10px 14px;
    }
    select,
    input:not([type="checkbox"]) {
      min-height: 44px;
      padding: 10px 8px;
    }
    textarea#chat-input {
      min-height: 64px;
      resize: none;
    }

    /* Topbar: selects fill available space */
    #topbar {
      gap: 6px;
      padding: 6px 8px;
    }
    #provider-select,
    #model-select {
      flex: 1;
      min-width: 0;
    }

    /* Editor toolbar: filename input fills row */
    #filename-input {
      flex: 1;
      width: auto !important;
      min-width: 0;
    }

    /* Chat controls: send button full-width, easy to tap */
    #chat-controls {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    #send-btn {
      width: 100%;
      order: 2;
    }
    label.toggle {
      order: 1;
    }
    #status {
      order: 3;
      margin-left: 0;
      text-align: center;
    }

    /* Code-block apply buttons stay compact on mobile */
    .btn-code-action {
      min-height: unset;
      padding: 4px 8px;
    }

    /* GitHub modal fills screen on narrow viewports */
    #github-modal {
      align-items: flex-end;
      padding: 0;
    }
    #github-modal-content {
      width: 100%;
      max-width: 100%;
      border-radius: 12px 12px 0 0;
      max-height: 92vh;
      max-height: 92dvh;
      padding: 16px 16px 24px;
    }
    #github-modal-actions {
      flex-direction: column;
      justify-content: stretch;
    }
    #github-modal-actions button {
      width: 100%;
    }

    #diff-modal {
      align-items: flex-end;
      padding: 0;
    }
    #diff-modal-content {
      width: 100%;
      max-width: 100%;
      border-radius: 12px 12px 0 0;
      max-height: 90vh;
      max-height: 90dvh;
      padding: 16px 16px 24px;
    }
    #diff-modal-actions { flex-direction: column; }
    #diff-modal-actions button { width: 100%; }

    #exec-confirm-modal {
      align-items: flex-end;
      padding: 0;
    }
    #exec-confirm-content {
      width: 100%;
      max-width: 100%;
      border-radius: 12px 12px 0 0;
      padding: 16px 16px 24px;
    }
    #exec-confirm-actions { flex-direction: column; }
    #exec-confirm-actions button { width: 100%; }
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>Decursor</h1>

  <select id="provider-select">
    <option value="openrouter">OpenRouter</option>
    <option value="ollama">Ollama (self-hosted)</option>
  </select>

  <select id="model-select">
    <!-- populated by app.js via /api/models -->
  </select>

  <input
    id="model-input-fallback"
    type="text"
    placeholder="ID modela..."
    style="display:none"
    title="Unesite ID modela ručno (lista modela nije dostupna)"
  />

  <button class="secondary" id="github-btn">GitHub</button>
</div>

<div id="layout">
  <!-- Left: file tree -->
  <div id="file-tree-pane">
    <div id="file-tree-header">
      <span>Fajlovi</span>
      <button class="refresh-btn" id="refresh-tree-btn" title="Osvježi stablo">↺</button>
    </div>
    <div id="file-tree"><p class="tree-empty">Učitavam...</p></div>
  </div>

  <!-- Center: Monaco editor -->
  <div id="editor-pane">
    <div id="editor-toolbar">
      <input id="filename-input" placeholder="filename.js" value="untitled.js" style="width:140px" />
      <button class="secondary" id="new-file-btn">Novi fajl</button>
      <button id="save-btn">Sačuvaj</button>
      <span id="editor-status" style="font-size:11px; opacity:0.6; margin-left:auto;"></span>
      <button class="secondary" id="terminal-toggle-btn" title="Otvori/zatvori terminal panel">⌨ Terminal</button>
    </div>
    <div id="monaco-container"></div>

    <!-- Terminal panel – lives inside #editor-pane, below Monaco -->
    <div id="terminal-pane">
      <div id="terminal-header">
        <span class="term-title">Terminal — workspace</span>
        <div class="term-header-btns">
          <button class="term-btn" id="terminal-clear-btn" title="Obriši output">⊘ clear</button>
          <button class="term-btn" id="terminal-close-btn" title="Zatvori">✕</button>
        </div>
      </div>
      <div id="terminal-output"></div>
      <div id="terminal-input-row">
        <span class="term-prompt-symbol">$</span>
        <input
          type="text"
          id="terminal-cmd-input"
          placeholder="unesite komandu..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>
  </div>

  <div id="chat-pane">
    <div id="chat-log"></div>
    <div id="chat-input-area">
      <div id="selected-files-info"></div>
      <textarea id="chat-input" placeholder="Pitaj AI nešto o kodu..."></textarea>
      <div id="chat-controls">
        <label class="toggle">
          <input type="checkbox" id="include-context" checked />
          Pošalji kod kao kontekst
        </label>
        <button id="send-btn">Pošalji</button>
        <span id="status"></span>
      </div>
    </div>
  </div>
</div>

<!-- GitHub modal -->
<div id="github-modal">
  <div id="github-modal-content">
    <h2>GitHub integracija</h2>

    <label>Personal Access Token (čuva se samo lokalno u browseru)</label>
    <input id="gh-token" type="password" placeholder="ghp_..." />

    <label>Repo (owner/repo)</label>
    <input id="gh-repo" placeholder="fileboin/decursor" />

    <label>Grana</label>
    <input id="gh-branch" placeholder="main" value="main" />

    <label>Putanja fajla u repou</label>
    <input id="gh-path" placeholder="index.html" />

    <div id="github-modal-actions">
      <button class="secondary" id="gh-pull-btn">Pull (učitaj)</button>
      <button id="gh-push-btn">Push (sačuvaj)</button>
      <button class="secondary" id="gh-close-btn">Zatvori</button>
    </div>
    <span id="gh-status" style="font-size:11px; opacity:0.7;"></span>
  </div>
</div>

<!-- Diff preview modal -->
<div id="diff-modal">
  <div id="diff-modal-content">
    <h2>Pregled izmjena</h2>
    <span id="diff-modal-subtitle"></span>
    <div id="diff-view"></div>
    <div id="diff-modal-actions">
      <button id="diff-accept-btn">✓ Prihvati i sačuvaj</button>
      <button class="secondary" id="diff-reject-btn">✗ Odbaci</button>
    </div>
  </div>
</div>

<!-- Exec confirm modal -->
<div id="exec-confirm-modal">
  <div id="exec-confirm-content">
    <h2>Pokretanje komande u terminalu</h2>
    <p>Sljedeća komanda će biti izvršena na serveru:</p>
    <pre id="exec-confirm-cmd"></pre>
    <div id="exec-confirm-actions">
      <button id="exec-accept-btn">▶ Pokreni</button>
      <button class="secondary" id="exec-reject-btn">Otkaži</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="app.js"></script>
</body>
</html>
